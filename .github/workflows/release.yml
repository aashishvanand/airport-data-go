name: Release and Publish

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26']

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Go ${{ matrix.go-version }}
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ matrix.go-version }}

    - name: Verify dependencies
      run: go mod verify

    - name: Run go vet
      run: go vet ./...

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Check test coverage
      run: go tool cover -func=coverage.out

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/release'
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26'

    - name: Read version from VERSION file
      id: version
      run: |
        VERSION=$(cat VERSION | tr -d '[:space:]')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT

    - name: Check if tag already exists
      id: check-tag
      run: |
        TAG="v$(cat VERSION | tr -d '[:space:]')"
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Run tests
      if: steps.check-tag.outputs.exists == 'false'
      run: go test -v -race ./...

    - name: Create and push tag
      if: steps.check-tag.outputs.exists == 'false'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
        git push origin "${{ steps.version.outputs.tag }}"

    - name: Index on Go module proxy
      if: steps.check-tag.outputs.exists == 'false'
      run: GOPROXY=proxy.golang.org go list -m github.com/aashishvanand/airport-data-go@${{ steps.version.outputs.tag }}

    - name: Create GitHub Release
      if: steps.check-tag.outputs.exists == 'false'
      uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        release_name: Release ${{ steps.version.outputs.tag }}
        body: |
          ## Release ${{ steps.version.outputs.tag }}

          Install or update:
          ```
          go get github.com/aashishvanand/airport-data-go@${{ steps.version.outputs.tag }}
          ```

          See [CHANGELOG.md](https://github.com/aashishvanand/airport-data-go/blob/release/CHANGELOG.md) for details.
        draft: false
        prerelease: false

    - name: Skip release (tag already exists)
      if: steps.check-tag.outputs.exists == 'true'
      run: |
        echo "Tag ${{ steps.version.outputs.tag }} already exists"
        echo "Skipping release step"
